<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPAboss</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#D2AC47;--ac2:#b8942e;--fundo:#000;--card:#0d0d0d;--card2:#111;--borda:#2a2200;--texto:#F5F0E8;--muted:#8a7a4a;--perigo:#FF5C5C;--alerta:#FFB347;--azul:#4A9EFF;--verde:#4CAF50;--sidebar:240px}
body{font-family:'DM Sans',sans-serif;background:var(--fundo);color:var(--texto);min-height:100dvh;font-size:14px;overflow-x:hidden}
@keyframes crownDrop{0%{transform:translateY(-60px);opacity:0}60%{transform:translateY(8px)}100%{transform:translateY(0);opacity:1}}
@keyframes textFade{0%{opacity:0;letter-spacing:12px}100%{opacity:1;letter-spacing:-1px}}
@keyframes subFade{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes lineGrow{0%{width:0}100%{width:120px}}
@keyframes splashOut{0%{opacity:1}100%{opacity:0}}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#splash{position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.sc{animation:crownDrop .7s cubic-bezier(.22,1,.36,1) .2s both}
.st{animation:textFade .7s cubic-bezier(.22,1,.36,1) .7s both;font-size:52px;font-weight:800;color:#fff}
.st span{color:#D2AC47;font-weight:300}
.sl{animation:lineGrow .5s ease 1s both;height:1px;background:#D2AC47;margin:0 auto}
.ss{animation:subFade .5s ease 1.2s both;font-size:11px;color:#8a7a4a;letter-spacing:3px;text-transform:uppercase}
#login-selector{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;flex-direction:column;gap:20px;overflow:hidden}
#ls-canvas{position:absolute;inset:0;z-index:0;pointer-events:none}
#ls-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px}
#ls-grid{position:absolute;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(210,172,71,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(210,172,71,.04) 1px,transparent 1px);background-size:48px 48px}
#ls-vignette{position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,#000 100%)}
.sel-logo{font-size:32px;font-weight:800;color:#fff;text-align:center}
.sel-logo span{color:#D2AC47;font-weight:300}
.sel-sub{font-size:12px;color:#8a7a4a;text-align:center;text-transform:uppercase;letter-spacing:2px;margin-bottom:24px}
.sel-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.sel-card{background:#0d0d0d;border:1px solid #2a2200;border-radius:16px;padding:32px 28px;width:175px;text-align:center;cursor:pointer;transition:all .3s;animation:fadeInUp .5s ease both}
.sel-card:nth-child(2){animation-delay:.1s}
.sel-card:hover{border-color:#D2AC47;background:#0a0800;transform:translateY(-4px)}
.sel-card-icon{font-size:40px;margin-bottom:12px}
.sel-card-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.sel-card-sub{font-size:11px;color:#8a7a4a}
#login-overlay{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:9998;padding:20px}
.lbox{background:#0d0d0d;border:1px solid #D2AC47;border-radius:16px;padding:36px 28px;width:100%;max-width:340px;animation:fadeInUp .4s ease}
.llogo{font-size:26px;font-weight:800;color:#fff;text-align:center;margin-bottom:8px}
.llogo span{color:#D2AC47;font-weight:300}
.ltype{display:inline-block;font-size:10px;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:16px}
.lt-adm{background:#1a1000;color:#D2AC47;border:1px solid #3a2e00}
.lt-afil{background:#0a1a2a;color:#4A9EFF;border:1px solid #1a3a5a}
.lerr{background:#1a0000;border:1px solid #550000;border-radius:8px;padding:10px;color:#FF5C5C;font-size:12px;margin-bottom:12px;text-align:center;display:none}
.llbl{font-size:11px;color:#8a7a4a;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.linp{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a2200;background:#111;color:#F5F0E8;font-size:13px;outline:none;margin-bottom:12px;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.linp:focus{border-color:#D2AC47}
.lbtn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .2s;margin-bottom:0}
.lbtn-adm{background:#D2AC47;color:#000}
.lbtn-adm:hover{background:#b8942e}
.lbtn-afil{background:#4A9EFF;color:#000}
.lbtn-afil:hover{background:#2a7eff}
.lback{display:block;text-align:center;margin-top:12px;font-size:12px;color:#8a7a4a;cursor:pointer}
.lback:hover{color:#D2AC47}
.layout{display:flex;min-height:100dvh}
.sidebar{width:var(--sidebar);background:#0a0800;border-right:1px solid #2a2200;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100dvh;z-index:100;transition:transform .3s ease}
.sidebar.closed{transform:translateX(calc(-1 * var(--sidebar)))}
.sb-logo{padding:18px 16px 12px;border-bottom:1px solid #2a2200}
.sb-logo-text{font-size:19px;font-weight:800;color:#fff}
.sb-logo-text span{color:#D2AC47;font-weight:300}
.sb-user{font-size:10px;color:#8a7a4a;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;color:var(--muted);font-size:13px;font-weight:500}
.ni:hover{background:#111;color:var(--texto)}
.ni.active{background:#111;color:#D2AC47;border-left-color:#D2AC47}
.ni-icon{font-size:17px;width:20px;text-align:center}
.ni-label{flex:1}
.ni-badge{background:#FF5C5C;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;display:none}
.sb-footer{padding:12px 16px;border-top:1px solid #2a2200;font-size:11px;color:#8a7a4a;display:flex;align-items:center;justify-content:space-between}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--alerta);animation:pulse 2s infinite}
.logout{font-size:11px;color:#8a7a4a;cursor:pointer}
.logout:hover{color:#FF5C5C}
.sb-toggle{position:fixed;top:14px;left:14px;z-index:200;background:#0a0800;border:1px solid #2a2200;color:#D2AC47;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sb-toggle.open{left:calc(var(--sidebar) + 12px)}
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none}
.sb-overlay.active{display:block}
.main{flex:1;margin-left:var(--sidebar);transition:margin .3s;min-height:100dvh}
.main.exp{margin-left:0}
.mh{padding:14px 20px;border-bottom:1px solid #2a2200;display:flex;align-items:center;gap:12px;background:#000;position:sticky;top:0;z-index:50}
.mh-title{font-size:16px;font-weight:600}
.mh-sub{font-size:12px;color:var(--muted);margin-top:1px}
.mb{padding:20px;max-width:800px}
.section{display:none}
.section.active{display:block;animation:fadeInUp .3s ease}
.card{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;margin-bottom:12px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:14px;animation:fadeInUp .4s ease both}
.metric-label{font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.metric-value{font-size:24px;font-weight:800}
.mv-ac{color:#D2AC47}.mv-al{color:var(--alerta)}.mv-ok{color:var(--verde)}.mv-az{color:var(--azul)}
.lucro-box{background:#0a0800;border:1px solid #3a2e00;border-radius:14px;padding:24px;text-align:center;margin-bottom:16px}
.lucro-label{font-size:11px;color:#D2AC47;text-transform:uppercase;letter-spacing:.5px}
.lucro-valor{font-size:40px;font-weight:800;color:#D2AC47;margin:6px 0}
.lucro-sub{font-size:12px;color:var(--muted)}
.ir{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--borda)}
.ir:last-child{border-bottom:none}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.chart-card{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:14px}
.chart-card-full{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:14px;margin-bottom:12px}
.chart-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.aviso-banner{background:#0d0900;border:2px solid #D2AC47;border-radius:12px;padding:16px;margin-bottom:16px}
.aviso-titulo{font-size:12px;color:#D2AC47;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.aviso-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--borda)}
.aviso-item:last-child{border-bottom:none}
.aviso-valor{font-size:16px;font-weight:700;color:#D2AC47}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--borda);background:var(--card2);color:var(--texto);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:#D2AC47}
select option{background:#111}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sep{height:1px;background:var(--borda);margin:14px 0}
.hint{font-size:12px;color:var(--muted);line-height:1.7}
.btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;margin-top:14px}
.btn-ac{background:#D2AC47;color:#000}
.btn-ac:hover{background:#b8942e}
.btn-ac:disabled{opacity:.45;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--muted)}
.btn-sm{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;border:none;cursor:pointer}
.btn-ok{background:#1a1000;color:#D2AC47;border:1px solid #3a2e00}
.btn-desfazer{background:var(--card2);color:var(--muted);border:1px solid var(--borda)}
.upload-area{border:2px dashed var(--borda);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px}
.upload-area:hover,.upload-area.drag{border-color:#D2AC47;background:#0a0800}
.upload-area input{display:none}
.print-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:10px}
.pi{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--borda)}
.pi img{width:100%;height:75px;object-fit:cover;display:block}
.ps{position:absolute;bottom:0;left:0;right:0;padding:3px 6px;font-size:10px;font-weight:600;text-align:center}
.ps-ok{background:rgba(0,180,0,.9);color:#fff}
.ps-fail{background:rgba(220,0,0,.9);color:#fff}
.ps-check{background:rgba(210,172,71,.9);color:#000}
.ia-result{border-radius:8px;padding:12px;font-size:13px;margin-top:8px;line-height:1.6}
.ia-ok{background:#0a1a0a;border:1px solid #2a4a2a;color:#4CAF50}
.ia-fail{background:#1a0a0a;border:1px solid #4a2a2a;color:#FF5C5C}
.ia-check{background:#1a1000;border:1px solid #3a2e00;color:#D2AC47}
.ia-block{background:#1a0000;border:2px solid #FF5C5C;border-radius:10px;padding:14px;text-align:center;color:#FF5C5C;font-weight:600;margin-top:10px;display:none}
.lead-card{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.lead-card:hover{border-color:#D2AC47;transform:translateX(2px)}
.lead-name{font-size:15px;font-weight:600}
.lead-meta{font-size:12px;color:var(--muted);margin-top:2px}
.pb{height:4px;background:var(--borda);border-radius:99px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:99px;background:#D2AC47;transition:width .6s ease}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;text-transform:uppercase}
.b-ok{background:#1a1000;color:#D2AC47}
.b-pend{background:#2a1e00;color:var(--alerta)}
.b-fail{background:#2a0000;color:var(--perigo)}
.b-az{background:#0a1a2a;color:var(--azul)}
.hoje-card{background:var(--card);border:2px solid #D2AC47;border-radius:12px;padding:16px;margin-bottom:12px;animation:fadeInUp .3s ease}
.hoje-titulo{font-size:11px;color:#D2AC47;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.hoje-nome{font-size:16px;font-weight:600}
.hoje-valor{font-size:30px;font-weight:800;color:#D2AC47;margin:8px 0 4px}
.pix-box{background:var(--card2);border:1px solid var(--borda);border-radius:8px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--azul);cursor:pointer;margin-top:8px;word-break:break-all;transition:all .2s}
.pix-box:hover{border-color:var(--azul)}
.back-btn{background:var(--card2);border:1px solid var(--borda);color:var(--texto);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;margin-bottom:14px;transition:all .2s}
.dep-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--borda)}
.dep-item:last-child{border-bottom:none}
.dep-data{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.dep-valor{font-size:15px;font-weight:600;margin-top:2px}
.cpa-banner{background:#1a1000;border:1px solid #D2AC47;border-radius:10px;padding:12px;text-align:center;color:#D2AC47;font-weight:600;font-size:14px;margin-top:10px}
.afil-card{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.afil-name{font-size:14px;font-weight:600}
.afil-meta{font-size:11px;color:var(--muted);margin-top:2px}
.pct-badge{background:#1a1000;color:#D2AC47;border:1px solid #3a2e00;font-size:13px;font-weight:700;padding:4px 12px;border-radius:8px}
.ac-wrap{position:relative}
.ac-lista{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid #D2AC47;border-top:none;border-radius:0 0 8px 8px;z-index:50;max-height:160px;overflow-y:auto;display:none}
.ac-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--borda)}
.ac-item:hover{background:var(--card2)}
.ac-item strong{color:#D2AC47}
.ac-item span{color:var(--muted);font-size:11px;display:block;margin-top:2px}
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9997;padding:20px}
.notif-box{background:var(--card);border:2px solid #D2AC47;border-radius:16px;padding:24px;width:100%;max-width:360px;animation:fadeInUp .3s ease}
.notif-titulo{font-size:16px;font-weight:700;color:#D2AC47;text-align:center;margin-bottom:6px}
.notif-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px;line-height:1.6}
.notif-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--borda);font-size:13px}
.notif-item:last-child{border-bottom:none}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:2}
.loading{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.err{background:#1a0000;border:1px solid #550000;border-radius:8px;padding:12px;color:var(--perigo);font-size:12px;margin-bottom:12px;line-height:1.6}
.succ{background:#1a1000;border:1px solid #3a2e00;border-radius:8px;padding:12px;color:#D2AC47;font-size:12px;margin-bottom:12px}
.afil-box{background:#0a1020;border:1px solid #1a3a5a;border-radius:12px;padding:14px;text-align:center;margin-bottom:10px}
.afil-box-label{font-size:11px;color:var(--azul);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.afil-box-value{font-size:28px;font-weight:800;color:var(--azul)}
@media(max-width:640px){
  .sidebar{width:80vw}
  .sidebar.closed{transform:translateX(-80vw)}
  .main{margin-left:0!important}
  .chart-grid{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr}
  .metrics{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="splash">
  <div class="sc">
    <svg width="64" height="50" viewBox="0 0 72 56" fill="none">
      <path d="M4 42L4 50L68 50L68 42Z" fill="#D2AC47"/>
      <path d="M4 42L16 16L26 34L36 6L46 34L56 16L68 42Z" fill="#D2AC47"/>
      <circle cx="36" cy="31" r="12" fill="#000"/>
      <text x="36" y="37" text-anchor="middle" font-size="15" font-weight="800" fill="#D2AC47" font-family="sans-serif">$</text>
    </svg>
  </div>
  <div class="st">CPA<span>boss</span></div>
  <div class="sl"></div>
  <div class="ss">Gestão de leads</div>
</div>

<div id="login-selector">
  <canvas id="ls-canvas"></canvas>
  <div id="ls-grid"></div>
  <div id="ls-vignette"></div>
  <div id="ls-content">
  <div>
    <div class="sel-logo">CPA<span>boss</span></div>
    <div class="sel-sub">Escolha seu tipo de acesso</div>
  </div>
  <div class="sel-cards">
    <div class="sel-card" onclick="mostrarLogin('adm')">
      <div class="sel-card-icon">👑</div>
      <div class="sel-card-title">Administrador</div>
      <div class="sel-card-sub">Acesso total ao sistema</div>
    </div>
    <div class="sel-card" onclick="mostrarLogin('afil')">
      <div class="sel-card-icon">🤝</div>
      <div class="sel-card-title">Afiliado</div>
      <div class="sel-card-sub">Acesso ao seu painel</div>
    </div>
  </div>
  </div>
</div>

<div id="login-overlay">
  <div class="lbox">
    <div style="text-align:center;margin-bottom:12px">
      <svg width="44" height="35" viewBox="0 0 72 56" fill="none">
        <path d="M4 42L4 50L68 50L68 42Z" fill="#D2AC47"/>
        <path d="M4 42L16 16L26 34L36 6L46 34L56 16L68 42Z" fill="#D2AC47"/>
        <circle cx="36" cy="31" r="12" fill="#0d0d0d"/>
        <text x="36" y="37" text-anchor="middle" font-size="15" font-weight="800" fill="#D2AC47" font-family="sans-serif">$</text>
      </svg>
    </div>
    <div class="llogo" style="text-align:center;margin-bottom:8px">CPA<span>boss</span></div>
    <div style="text-align:center;margin-bottom:16px"><span class="ltype lt-adm" id="ltype-badge">ADM</span></div>
    <div class="lerr" id="lerr">Usuário ou senha incorretos</div>
    <label class="llbl">Usuário</label>
    <input class="linp" id="l-user" type="text" placeholder="Digite seu usuário" onkeydown="if(event.key==='Enter')fazerLogin()">
    <label class="llbl">Senha</label>
    <input class="linp" id="l-pass" type="password" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')fazerLogin()" style="margin-bottom:16px">
    <button class="lbtn lbtn-adm" id="lbtn" onclick="fazerLogin()">Entrar</button>
    <span class="lback" onclick="voltarSelector()">← Voltar</span>
  </div>
</div>

<div id="notif-overlay" class="notif-overlay" style="display:none" onclick="fecharNotif()">
  <div class="notif-box" onclick="event.stopPropagation()">

function gerarDeps(meta,inicio){
  const num=meta<=30?2:meta<=60?3:4;
  let vals=[],tries=0;
  while(tries++<300){
    vals=[];let resto=meta,ok=true;
    for(let i=0;i<num-1;i++){
      const mn=Math.max(5,Math.ceil(resto*0.15)),mx=Math.floor(resto*0.55);
      if(mn>=mx){ok=false;break;}
      let v=mn+Math.floor(Math.random()*(mx-mn));
      while(vals.includes(v)&&v<mx)v++;
      if(vals.includes(v)){ok=false;break;}
      vals.push(v);resto-=v;
    }
    if(!ok)continue;
    if(resto<5||vals.includes(resto))continue;
    vals.push(resto);
    if(new Set(vals).size===vals.length&&vals.every(v=>v>0))break;
  }
  let datas=[inicio];
  for(let i=1;i<vals.length;i++)datas.push(addD(datas[i-1],rnd(1,4)));
  return vals.map((v,i)=>({valor:v,data_deposito:datas[i],feito:false}));
}

async function salvarLead(){
  const nome=document.getElementById('fn')?.value.trim();
  const tel=document.getElementById('ft')?.value.trim();
  const pix=document.getElementById('fp')?.value.trim();
  const casa=document.getElementById('fc')?.value;
  const cpa=parseFloat(document.getElementById('fcpa')?.value)||0;
  const meta=parseFloat(document.getElementById('fmeta')?.value)||0;
  const ini=document.getElementById('fini')?.value;
  const afilId=document.getElementById('fafil')?.value||null;
  const msg=document.getElementById('fmsg');
  if(!nome||!tel||!pix||!casa||!cpa||!meta||!ini){msg.innerHTML='<div class="err">Preencha todos os campos!</div>';return;}
  if(!printOK){msg.innerHTML='<div class="err">O print não foi validado pela IA. Envie um print válido para continuar.</div>';return;}
  msg.innerHTML='<div class="loading">Salvando...</div>';
  try{
    const ls=await dbPost('leads',[{nome,telefone:tel,pix,casa,cpa,meta,cpa_validado:false,print_verificado:true,afiliado_id:afilId||null}]);
    const lid=ls[0].id;
    await dbPost('depositos',gerarDeps(meta,ini).map(d=>({...d,lead_id:lid})));
    if(afilId){
      const afil=await dbGet('afiliados',`id=eq.${afilId}`);
      if(afil.length){
        const valorAfil=cpa*(afil[0].percentual/100);
        await dbPost('leads_afiliados',[{afiliado_id:afilId,lead_id:lid,valor_pago:valorAfil,pago:false}]);
      }
    }
    msg.innerHTML='<div class="succ">✓ Lead salvo e verificado! Depósitos gerados automaticamente.</div>';
    setTimeout(()=>{goTab('leads');},1800);
  }catch(e){msg.innerHTML=`<div class="err">Erro: ${e.message}</div>`;}
}

function copiarPIX(el,pix){
  navigator.clipboard.writeText(pix).catch(()=>{});
  const orig=el.innerHTML;
  el.innerHTML='✓ Copiado!';el.style.color='#D2AC47';el.style.borderColor='#D2AC47';
  setTimeout(()=>{el.innerHTML=orig;el.style.color='';el.style.borderColor='';},2000);
}

async function exportarCSV(){
  try{
    const[leads,deps]=await Promise.all([dbGet('leads'),dbGet('depositos')]);
    const dm={};deps.forEach(d=>{if(!dm[d.lead_id])dm[d.lead_id]=[];dm[d.lead_id].push(d);});
    let csv='Nome,Telefone,PIX,Casa,Meta (R$),CPA (R$),Depositado (R$),Print Verificado,Status,Dep1,Dep2,Dep3,Dep4\n';
    leads.forEach(l=>{
      const lds=(dm[l.id]||[]).sort((a,b)=>a.data_deposito.localeCompare(b.data_deposito));
      const feito=lds.filter(d=>d.feito).reduce((s,d)=>s+parseFloat(d.valor),0);
      const d4=lds.slice(0,4).map(d=>`${fmtD(d.data_deposito)} R$${d.valor} ${d.feito?'(feito)':'(pendente)'}`);
      while(d4.length<4)d4.push('');
      csv+=`"${l.nome}","${l.telefone}","${l.pix}","${l.casa}",${l.meta},${l.cpa},${feito.toFixed(2)},"${l.print_verificado?'Sim':'Não'}","${l.cpa_validado?'CPA Validado':'Em andamento'}","${d4[0]}","${d4[1]}","${d4[2]}","${d4[3]}"\n`;
    });
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`cpaboss-${toDay()}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }catch(e){alert('Erro ao exportar: '+e.message);}
}

// Partículas douradas no seletor
function initParticles(){
  const canvas=document.getElementById('ls-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
  const particles=Array.from({length:55},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,
    r:Math.random()*1.8+.4,
    vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
    o:Math.random()*.5+.1,
    pulse:Math.random()*Math.PI*2
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.pulse+=.012;
      if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
      if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
      const alpha=p.o*(0.6+0.4*Math.sin(p.pulse));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(210,172,71,${alpha})`;ctx.fill();
    });
    // linhas entre partículas próximas
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x;
        const dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(210,172,71,${.06*(1-dist/120)})`;
          ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

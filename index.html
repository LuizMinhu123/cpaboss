<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPAboss</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand */
  --em:#10B981;--em2:#059669;--em-dim:rgba(16,185,129,.12);--em-border:rgba(16,185,129,.2);
  --gold:#F59E0B;--gold-dim:rgba(245,158,11,.1);--gold-border:rgba(245,158,11,.2);
  /* Surfaces */
  --bg:#0F1117;--s1:#161B26;--s2:#1C2333;--s3:#242B3D;
  /* Borders */
  --b1:#1E2538;--b2:#273047;--b3:#313D58;
  /* Text */
  --t1:#F1F5F9;--t2:#94A3B8;--t3:#4A5568;
  /* Status */
  --red:#EF4444;--orange:#F97316;--blue:#3B82F6;--purple:#8B5CF6;
  /* Layout */
  --sb:260px;--top:56px
}
*{transition:color .1s,background-color .1s,border-color .1s,box-shadow .1s,transform .12s,opacity .1s}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;overflow-x:hidden;line-height:1.5;-webkit-font-smoothing:antialiased}

/* KEYFRAMES */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes crownDrop{0%{transform:translateY(-40px);opacity:0}65%{transform:translateY(5px)}100%{transform:translateY(0);opacity:1}}
@keyframes wordFade{0%{opacity:0;filter:blur(8px)}100%{opacity:1;filter:blur(0)}}
@keyframes lineExpand{from{width:0}to{width:80px}}
@keyframes splashOut{to{opacity:0;pointer-events:none}}

/* ═══════════════════════ SPLASH ═══════════════════════ */
#splash{position:fixed;inset:0;background:#0A0C10;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}
.sc{animation:crownDrop .6s cubic-bezier(.22,1,.36,1) .1s both}
.st{animation:wordFade .6s ease .6s both;font-size:44px;font-weight:800;color:#fff;letter-spacing:-2px;font-family:'Inter',sans-serif}
.st span{color:var(--em);font-weight:300}
.sl{animation:lineExpand .4s ease .9s both;height:1px;background:linear-gradient(90deg,transparent,var(--em),transparent);margin:6px auto 0}
.ss{animation:fadeUp .4s ease 1.05s both;font-size:10px;color:var(--t3);letter-spacing:5px;text-transform:uppercase}

/* ═══════════════════════ SELECTOR ═══════════════════════ */
#login-selector{position:fixed;inset:0;background:#0A0C10;display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;flex-direction:column;gap:14px;overflow:hidden}
#ls-canvas{position:absolute;inset:0;z-index:0;pointer-events:none}
#ls-grid{position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(16,185,129,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.025) 1px,transparent 1px);
  background-size:40px 40px}
#ls-vignette{position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 20%,#0A0C10 80%)}
#ls-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px}
.sel-logo{font-size:32px;font-weight:800;color:#fff;text-align:center;letter-spacing:-1.5px}
.sel-logo span{color:var(--em);font-weight:300}
.sel-tagline{font-size:10px;color:var(--t3);text-align:center;text-transform:uppercase;letter-spacing:4px;margin-bottom:32px}
.sel-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.sel-card{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:30px 26px;width:176px;text-align:center;cursor:pointer;transition:all .2s;animation:fadeUp .5s ease both;position:relative;overflow:hidden}
.sel-card:nth-child(2){animation-delay:.07s}
.sel-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--em-dim),transparent 70%);opacity:0;transition:opacity .25s}
.sel-card:hover{border-color:var(--em-border);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.5)}
.sel-card:hover::before{opacity:1}
.sel-icon{font-size:36px;margin-bottom:10px;display:block}
.sel-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:4px}
.sel-sub{font-size:11px;color:var(--t3)}

/* ═══════════════════════ LOGIN ═══════════════════════ */
#login-overlay{position:fixed;inset:0;background:rgba(10,12,16,.9);display:none;align-items:center;justify-content:center;z-index:9998;padding:20px;backdrop-filter:blur(16px)}
.lbox{background:var(--s1);border:1px solid var(--b2);border-radius:18px;padding:34px 30px;width:100%;max-width:340px;animation:fadeUp .3s ease;box-shadow:0 24px 60px rgba(0,0,0,.7)}
.llogo{font-size:24px;font-weight:800;color:#fff;text-align:center;letter-spacing:-1px}
.llogo span{color:var(--em);font-weight:300}
.ltype{display:inline-flex;align-items:center;font-size:9px;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:18px}
.lt-adm{background:var(--em-dim);color:var(--em);border:1px solid var(--em-border)}
.lt-afil{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.lerr{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.22);border-radius:9px;padding:10px 14px;color:var(--red);font-size:12px;margin-bottom:12px;text-align:center;display:none}
.llbl{font-size:10px;color:var(--t3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.linp{width:100%;padding:11px 14px;border-radius:9px;border:1px solid var(--b2);background:var(--s2);color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;outline:none;margin-bottom:11px}
.linp:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em-dim)}
.linp::placeholder{color:var(--t3)}
.lbtn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;letter-spacing:.1px;font-family:'Inter',sans-serif}
.lbtn-adm{background:linear-gradient(135deg,#34D399,var(--em2));color:#0A0C10;box-shadow:0 4px 14px rgba(16,185,129,.25)}
.lbtn-adm:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(16,185,129,.35)}
.lbtn-afil{background:linear-gradient(135deg,#60A5FA,var(--blue));color:#0A0C10}
.lbtn-afil:hover{transform:translateY(-1px)}
.lback{display:block;text-align:center;margin-top:12px;font-size:12px;color:var(--t3);cursor:pointer}
.lback:hover{color:var(--em)}

/* ═══════════════════════ LAYOUT ═══════════════════════ */
.layout{display:flex;min-height:100dvh;width:100%}

/* ═══════════════════════ SIDEBAR ═══════════════════════ */
.sidebar{width:var(--sb);background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100dvh;z-index:100;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sidebar.closed{transform:translateX(calc(-1 * var(--sb)))}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px}
.sb-brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.sb-mark{width:28px;height:28px;background:linear-gradient(135deg,#34D399,var(--em2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;box-shadow:0 3px 8px rgba(16,185,129,.3)}
.sb-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1}
.sb-name span{color:var(--em);font-weight:300}
.sb-role{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px}
.sb-nav{flex:1;padding:8px 8px;overflow-y:auto;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.sb-group{margin-bottom:4px}
.sb-group-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;font-weight:700;padding:10px 10px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:8px;color:var(--t3);font-size:13px;font-weight:500;margin-bottom:1px;position:relative}
.ni:hover{background:var(--s2);color:var(--t2)}
.ni.active{background:var(--em-dim);color:var(--em);font-weight:600}
.ni-icon{font-size:15px;width:18px;text-align:center;opacity:.7;flex-shrink:0}
.ni.active .ni-icon{opacity:1}
.ni-label{flex:1}
.ni-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;display:none;line-height:1.4}
.sb-foot{padding:12px 14px;border-top:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.sb-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:pulse 2s infinite;flex-shrink:0}
.sdot.online{background:var(--em)}
.logout{font-size:11px;color:var(--t3);cursor:pointer;padding:3px 8px;border-radius:6px}
.logout:hover{color:var(--red);background:rgba(239,68,68,.08)}

/* TOGGLE */
.sb-toggle{position:fixed;top:14px;left:14px;z-index:200;background:var(--s1);border:1px solid var(--b2);color:var(--t2);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.sb-toggle:hover{border-color:var(--em-border);color:var(--em)}
.sb-toggle.open{left:calc(var(--sb) + 10px)}
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;display:none;backdrop-filter:blur(4px)}
.sb-overlay.active{display:block}

/* ═══════════════════════ MAIN ═══════════════════════ */
.main{flex:1;margin-left:var(--sb);min-height:100dvh;display:flex;flex-direction:column;transition:margin .25s cubic-bezier(.4,0,.2,1)}
.main.exp{margin-left:0}
.mh{height:var(--top);padding:0 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:14px;background:rgba(15,17,23,.8);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
.mh-spacer{width:30px;flex-shrink:0}
.mh-info{flex:1}
.mh-title{font-size:14px;font-weight:700;color:var(--t1);line-height:1.2;letter-spacing:-.2px}
.mh-sub{font-size:11px;color:var(--t3);margin-top:1px}
.mb{padding:24px 28px;flex:1;width:100%;box-sizing:border-box}
.section{display:none}
.section.active{display:block;animation:fadeUp .22s ease}

/* ═══════════════════════ CARDS ═══════════════════════ */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:18px 22px;margin-bottom:12px;width:100%}
.card:hover{border-color:var(--b2)}
.card-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-title::before{content:'';width:2px;height:10px;background:var(--em);border-radius:2px;display:inline-block;flex-shrink:0}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;width:100%}
.metric{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;animation:fadeUp .35s ease both}
.metric:nth-child(1){animation-delay:.04s}.metric:nth-child(2){animation-delay:.08s}
.metric:nth-child(3){animation-delay:.12s}.metric:nth-child(4){animation-delay:.16s}
.metric-label{font-size:10px;color:var(--t3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.metric-value{font-size:24px;font-weight:800;line-height:1;letter-spacing:-1px}
.mv-ac{color:var(--em)}.mv-al{color:var(--orange)}.mv-ok{color:var(--em)}.mv-az{color:var(--blue)}

/* LUCRO */
.lucro-box{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:24px 28px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:20px;width:100%;position:relative;overflow:hidden}
.lucro-box::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--em),transparent)}
.lucro-main{}
.lucro-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:6px}
.lucro-valor{font-size:38px;font-weight:800;color:var(--em);line-height:1;letter-spacing:-2px}
.lucro-sub{font-size:12px;color:var(--t3);margin-top:6px}
.lucro-badge{background:var(--em-dim);border:1px solid var(--em-border);border-radius:10px;padding:12px 18px;text-align:center;min-width:130px}
.lucro-badge-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.lucro-badge-val{font-size:16px;font-weight:700;color:var(--em)}

/* AVISO */
.aviso-banner{background:rgba(245,158,11,.05);border:1px solid var(--gold-border);border-left:3px solid var(--gold);border-radius:10px;padding:14px 18px;margin-bottom:14px;animation:fadeUp .3s ease}
.aviso-titulo{font-size:10px;color:var(--em);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.aviso-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1)}
.aviso-item:last-child{border-bottom:none}
.aviso-valor{font-size:14px;font-weight:700;color:var(--em)}

/* INFO ROWS */
.ir{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 0;border-bottom:1px solid var(--b1)}
.ir:last-child{border-bottom:none}
.ir span:first-child{color:var(--t2)}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;width:100%}
.chart-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px 18px}
.chart-card-full{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px 18px;margin-bottom:12px;width:100%}
.chart-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:12px}

/* ═══════════════════════ FORM ═══════════════════════ */
label{font-size:10px;color:var(--t3);display:block;margin-bottom:5px;margin-top:13px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
label:first-child{margin-top:0}
input,select{width:100%;padding:10px 13px;border-radius:9px;border:1px solid var(--b2);background:var(--s2);color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .12s,box-shadow .12s}
input:focus,select:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em-dim)}
input::placeholder{color:var(--t3)}
select option{background:var(--s2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:13px;width:100%}
.sep{height:1px;background:var(--b1);margin:16px 0;width:100%}
.hint{font-size:12px;color:var(--t3);line-height:1.7}

/* BUTTONS */
.btn{width:100%;padding:12px;border-radius:9px;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:14px;letter-spacing:.1px;font-family:'Inter',sans-serif}
.btn-ac{background:linear-gradient(135deg,#34D399,var(--em2));color:#0A0C10;box-shadow:0 3px 12px rgba(16,185,129,.22)}
.btn-ac:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(16,185,129,.32)}
.btn-ac:active{transform:none}
.btn-ac:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;border:1px solid var(--b2);color:var(--t2)}
.btn-outline:hover{border-color:var(--em-border);color:var(--em)}
.btn-sm{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.btn-ok{background:var(--em-dim);color:var(--em);border:1px solid var(--em-border)}
.btn-ok:hover{background:rgba(16,185,129,.18)}
.btn-desfazer{background:var(--s2);color:var(--t2);border:1px solid var(--b2)}

/* UPLOAD */
.upload-area{border:2px dashed var(--b2);border-radius:10px;padding:28px;text-align:center;cursor:pointer;margin-bottom:10px;width:100%}
.upload-area:hover,.upload-area.drag{border-color:var(--em-border);background:var(--em-dim)}
.upload-area input{display:none}
.print-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-top:10px}
.pi{position:relative;border-radius:7px;overflow:hidden;border:1px solid var(--b1)}
.pi img{width:100%;height:70px;object-fit:cover;display:block}
.ps{position:absolute;bottom:0;left:0;right:0;padding:3px 6px;font-size:10px;font-weight:600;text-align:center}
.ps-ok{background:rgba(16,185,129,.9);color:#fff}
.ps-fail{background:rgba(239,68,68,.9);color:#fff}
.ps-check{background:rgba(245,158,11,.9);color:#000}
.ia-result{border-radius:9px;padding:11px 14px;font-size:12px;margin-top:9px;line-height:1.6}
.ia-ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:var(--em)}
.ia-fail{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.ia-check{background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--em)}
.ia-block{background:rgba(239,68,68,.05);border:1.5px solid rgba(239,68,68,.35);border-radius:9px;padding:13px;text-align:center;color:var(--red);font-weight:600;margin-top:9px;display:none;font-size:13px}

/* LEADS */
.lead-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px 18px;margin-bottom:0;cursor:pointer;position:relative}
.lead-card:hover{border-color:var(--em-border);background:var(--s2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.lead-name{font-size:14px;font-weight:600;color:var(--t1)}
.lead-meta{font-size:12px;color:var(--t3);margin-top:3px;display:flex;align-items:center;gap:7px}
.pb{height:2px;background:var(--b2);border-radius:99px;overflow:hidden;margin-top:10px}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--em),#34D399);transition:width .5s ease}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-top:4px}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.4px}
.b-ok{background:var(--em-dim);color:var(--em);border:1px solid var(--em-border)}
.b-pend{background:rgba(249,115,22,.1);color:var(--orange);border:1px solid rgba(249,115,22,.22)}
.b-fail{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-az{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}

/* HOJE */
.hoje-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;width:100%}
.hoje-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px 22px;animation:fadeUp .25s ease;position:relative;overflow:hidden;width:100%}
.hoje-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--casa-cor,var(--em))}
.hoje-titulo{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.hoje-nome{font-size:16px;font-weight:700;color:var(--t1)}
.hoje-valor{font-size:32px;font-weight:800;color:var(--em);margin:9px 0 5px;line-height:1;letter-spacing:-1px}
.pix-box{background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:10px 13px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue);cursor:pointer;margin-top:9px;word-break:break-all;display:flex;align-items:center;gap:8px}
.pix-box:hover{border-color:var(--blue);background:rgba(59,130,246,.06)}
.pix-box::before{content:'⎘';font-size:13px;flex-shrink:0;font-family:sans-serif}

/* DETALHE */
.back-btn{background:var(--s2);border:1px solid var(--b2);color:var(--t2);padding:6px 13px;border-radius:8px;font-size:12px;cursor:pointer;margin-bottom:14px;font-family:'Inter',sans-serif}
.back-btn:hover{border-color:var(--em-border);color:var(--em)}
.dep-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--b1)}
.dep-item:last-child{border-bottom:none}
.dep-data{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t3)}
.dep-valor{font-size:14px;font-weight:700;margin-top:2px}
.cpa-banner{background:var(--em-dim);border:1px solid var(--em-border);border-radius:10px;padding:12px;text-align:center;color:var(--em);font-weight:700;font-size:14px;margin-top:10px}

/* AFILIADOS */
.afil-card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px 18px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;width:100%}
.afil-card:hover{border-color:var(--b2)}
.afil-name{font-size:14px;font-weight:600;color:var(--t1)}
.afil-meta{font-size:11px;color:var(--t3);margin-top:2px}
.pct-badge{background:var(--em-dim);color:var(--em);border:1px solid var(--em-border);font-size:13px;font-weight:800;padding:3px 11px;border-radius:7px}

/* AUTOCOMPLETE */
.ac-wrap{position:relative}
.ac-lista{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--s1);border:1px solid var(--em-border);border-radius:9px;z-index:50;max-height:180px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ac-item{padding:9px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--b1)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--s2)}
.ac-item strong{color:var(--em)}
.ac-item span{color:var(--t3);font-size:11px;display:block;margin-top:1px}

/* NOTIF */
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9997;padding:20px;backdrop-filter:blur(10px)}
.notif-box{background:var(--s1);border:1px solid var(--em-border);border-radius:16px;padding:26px;width:100%;max-width:350px;animation:fadeUp .25s ease}
.notif-titulo{font-size:16px;font-weight:800;color:var(--em);text-align:center;margin-bottom:5px;letter-spacing:-.5px}
.notif-sub{font-size:13px;color:var(--t3);text-align:center;margin-bottom:16px;line-height:1.6}
.notif-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b1);font-size:13px}
.notif-item:last-child{border-bottom:none}

/* MISC */
.empty{text-align:center;padding:80px 40px;color:var(--t3);font-size:14px;line-height:2}
.loading{text-align:center;padding:60px;color:var(--t3);font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px}
.loading::before{content:'';width:14px;height:14px;border:2px solid var(--em);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.err{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.22);border-radius:9px;padding:12px 15px;color:var(--red);font-size:13px;margin-bottom:12px;line-height:1.6}
.succ{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:9px;padding:12px 15px;color:var(--em);font-size:13px;margin-bottom:12px}
.afil-box{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.18);border-radius:10px;padding:14px;text-align:center;margin-bottom:10px}
.afil-box-label{font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:5px}
.afil-box-value{font-size:26px;font-weight:800;color:var(--blue);letter-spacing:-1px}

/* ═══════════════════════ RESPONSIVE ═══════════════════════ */
@media(max-width:640px){
  .sidebar{width:82vw}
  .sidebar.closed{transform:translateX(-82vw)}
  .main{margin-left:0!important}
  .chart-grid,.row2{grid-template-columns:1fr}
  .metrics{grid-template-columns:1fr 1fr}
  .mb{padding:14px 12px}
  .lucro-box{flex-direction:column;text-align:center}
  .lucro-valor{font-size:32px}
  .hoje-grid{grid-template-columns:1fr}
}
@media(min-width:1200px){
  .metrics{grid-template-columns:repeat(4,1fr)}
}

async function carregarCache(){try{leadsCache=await dbGet('leads','');}catch{}}
function acBuscar(c,v){
  if(v.length<1){acFechar(0);return;}
  const vl=v.toLowerCase();
  const res=leadsCache.filter(l=>{
    if(c==='nome')return l.nome?.toLowerCase().includes(vl);
    if(c==='tel')return l.telefone?.includes(vl);
    if(c==='pix')return l.pix?.toLowerCase().includes(vl);
  }).slice(0,5);
  const id=c==='nome'?'ac-nome':c==='tel'?'ac-tel':'ac-pix';
  const lista=document.getElementById(id);if(!lista)return;
  if(!res.length){lista.style.display='none';return;}
  lista.innerHTML=res.map(l=>`<div class="ac-item" onmousedown="acSel('${l.id}')"><strong>${l.nome}</strong><span>${l.telefone} · ${l.pix}</span></div>`).join('');
  lista.style.display='block';
}
function acSel(id){
  const l=leadsCache.find(x=>x.id===id);if(!l)return;
  ['fn','ft','fp'].forEach((fid,i)=>{const el=document.getElementById(fid);if(el)el.value=[l.nome,l.telefone,l.pix][i]||'';});
  acFechar(0);
}
function acFechar(d){setTimeout(()=>{document.querySelectorAll('.ac-lista').forEach(el=>el.style.display='none');},d);}

function dragOver(e){e.preventDefault();document.getElementById('ua')?.classList.add('drag');}
function dragLeave(){document.getElementById('ua')?.classList.remove('drag');}
function dropFile(e){e.preventDefault();dragLeave();processarPrints(e.dataTransfer.files);}

async function processarPrints(files){
  const prev=document.getElementById('pp');
  const iaDiv=document.getElementById('ia-res');
  const block=document.getElementById('ia-block');
  const btn=document.getElementById('btn-salvar');
  if(!prev)return;
  prev.innerHTML='';printsB64=[];printOK=false;
  if(block)block.style.display='none';
  if(btn){btn.disabled=true;btn.style.opacity='.45';}
  iaDiv.style.display='block';iaDiv.className='ia-result ia-check';
  iaDiv.textContent='🔍 Analisando com IA...';
  const promises=Array.from(files).map(f=>new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      printsB64.push({data:e.target.result.split(',')[1],type:f.type});
      const div=document.createElement('div');div.className='pi';
      div.innerHTML=`<img src="${e.target.result}"><div class="ps ps-check">Verificando...</div>`;
      prev.appendChild(div);res();
    };r.readAsDataURL(f);
  }));
  await Promise.all(promises);
  await verificarIA();
}

async function verificarIA(){
  const iaDiv=document.getElementById('ia-res');
  const block=document.getElementById('ia-block');
  const btn=document.getElementById('btn-salvar');
  const items=document.querySelectorAll('.pi');
  const hoje=new Date().toLocaleDateString('pt-BR');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:400,messages:[{role:'user',content:[
        ...printsB64.map(p=>({type:'image',source:{type:'base64',media_type:p.type,data:p.data}})),
        {type:'text',text:`Analise este print de casa de apostas. Responda APENAS em JSON: {"conta_criada_hoje":true|false,"data_encontrada":"DD/MM/AAAA ou nao encontrada","confianca":"alta|media|baixa","motivo":"explicacao curta"}. Hoje é ${hoje}. Procure datas de registro/criação da conta no print.`}
      ]}]})
    });
    const data=await r.json();
    const txt=data.content?.[0]?.text||'{}';
    let res;try{res=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch{res={conta_criada_hoje:false,motivo:'Não foi possível analisar'};}
    items.forEach(el=>{const s=el.querySelector('.ps');s.className='ps '+(res.conta_criada_hoje?'ps-ok':'ps-fail');s.textContent=res.conta_criada_hoje?'✓ Válido':'✗ Inválido';});
    if(res.conta_criada_hoje){
      printOK=true;
      iaDiv.className='ia-result ia-ok';

function aplicarTemaCasa(nome){

function gerarDeps(meta,inicio){
  const num=meta<=30?2:meta<=60?3:4;
  let vals=[],tries=0;
  while(tries++<300){
    vals=[];let resto=meta,ok=true;
    for(let i=0;i<num-1;i++){
      const mn=Math.max(5,Math.ceil(resto*0.15)),mx=Math.floor(resto*0.55);
      if(mn>=mx){ok=false;break;}
      let v=mn+Math.floor(Math.random()*(mx-mn));
      while(vals.includes(v)&&v<mx)v++;
      if(vals.includes(v)){ok=false;break;}
      vals.push(v);resto-=v;
    }
    if(!ok)continue;
    if(resto<5||vals.includes(resto))continue;
    vals.push(resto);
    if(new Set(vals).size===vals.length&&vals.every(v=>v>0))break;
  }
  let datas=[inicio];
  for(let i=1;i<vals.length;i++)datas.push(addD(datas[i-1],rnd(1,4)));
  return vals.map((v,i)=>({valor:v,data_deposito:datas[i],feito:false}));
}

async function salvarLead(){
  const nome=document.getElementById('fn')?.value.trim();
  const tel=document.getElementById('ft')?.value.trim();
  const pix=document.getElementById('fp')?.value.trim();
  const casa=document.getElementById('fc')?.value;
  const cpa=parseFloat(document.getElementById('fcpa')?.value)||0;
  const meta=parseFloat(document.getElementById('fmeta')?.value)||0;
  const ini=document.getElementById('fini')?.value;
  const afilId=document.getElementById('fafil')?.value||null;
  const msg=document.getElementById('fmsg');
  if(!nome||!tel||!pix||!casa||!cpa||!meta||!ini){msg.innerHTML='<div class="err">Preencha todos os campos!</div>';return;}
  if(!printOK){msg.innerHTML='<div class="err">O print não foi validado pela IA. Envie um print válido para continuar.</div>';return;}
  msg.innerHTML='<div class="loading">Salvando...</div>';
  try{
    const ls=await dbPost('leads',[{nome,telefone:tel,pix,casa,cpa,meta,cpa_validado:false,print_verificado:true,afiliado_id:afilId||null}]);
    const lid=ls[0].id;
    await dbPost('depositos',gerarDeps(meta,ini).map(d=>({...d,lead_id:lid})));
    if(afilId){
      const afil=await dbGet('afiliados',`id=eq.${afilId}`);
      if(afil.length){
        const valorAfil=cpa*(afil[0].percentual/100);
        await dbPost('leads_afiliados',[{afiliado_id:afilId,lead_id:lid,valor_pago:valorAfil,pago:false}]);
      }
    }
    msg.innerHTML='<div class="succ">✓ Lead salvo e verificado! Depósitos gerados automaticamente.</div>';
    setTimeout(()=>{goTab('leads');},1800);
  }catch(e){msg.innerHTML=`<div class="err">Erro: ${e.message}</div>`;}
}

async function toggleDep(depId,leadId,navId,feito){

let printOK2=false,printsB642=[];
function dragOver2(e){e.preventDefault();document.getElementById('ua2')?.classList.add('drag');}
function dragLeave2(){document.getElementById('ua2')?.classList.remove('drag');}
function dropFile2(e){e.preventDefault();dragLeave2();processarPrints2(e.dataTransfer.files);}

async function processarPrints2(files){
  const prev=document.getElementById('pp2');
  const iaDiv=document.getElementById('ia-res2');
  const block=document.getElementById('ia-block2');
  const btn=document.getElementById('btn-salvar-afil');
  if(!prev)return;
  prev.innerHTML='';printsB642=[];printOK2=false;
  if(block)block.style.display='none';
  if(btn){btn.disabled=true;btn.style.opacity='.45';}
  iaDiv.style.display='block';iaDiv.className='ia-result ia-check';
  iaDiv.textContent='🔍 Analisando com IA...';
  const promises=Array.from(files).map(f=>new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      printsB642.push({data:e.target.result.split(',')[1],type:f.type});
      const div=document.createElement('div');div.className='pi';
      div.innerHTML=`<img src="${e.target.result}"><div class="ps ps-check">Verificando...</div>`;
      prev.appendChild(div);res();
    };r.readAsDataURL(f);
  }));
  await Promise.all(promises);
  await verificarIA2();
}

async function verificarIA2(){
  const iaDiv=document.getElementById('ia-res2');
  const block=document.getElementById('ia-block2');
  const btn=document.getElementById('btn-salvar-afil');
  const items=document.querySelectorAll('#pp2 .pi');
  const hoje=new Date().toLocaleDateString('pt-BR');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:400,messages:[{role:'user',content:[
        ...printsB642.map(p=>({type:'image',source:{type:'base64',media_type:p.type,data:p.data}})),
        {type:'text',text:`Analise este print de casa de apostas. Responda APENAS em JSON: {"conta_criada_hoje":true|false,"data_encontrada":"DD/MM/AAAA ou nao encontrada","confianca":"alta|media|baixa","motivo":"explicacao curta"}. Hoje é ${hoje}.`}
      ]}]})
    });
    const data=await r.json();
    const txt=data.content?.[0]?.text||'{}';
    let res;try{res=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch{res={conta_criada_hoje:false,motivo:'Não foi possível analisar'};}
    items.forEach(el=>{const s=el.querySelector('.ps');s.className='ps '+(res.conta_criada_hoje?'ps-ok':'ps-fail');s.textContent=res.conta_criada_hoje?'✓ Válido':'✗ Inválido';});
    if(res.conta_criada_hoje){
      printOK2=true;
      iaDiv.className='ia-result ia-ok';
      iaDiv.innerHTML=`✅ <strong>Conta verificada!</strong> Data: ${res.data_encontrada} · Confiança: ${res.confianca}<br><small>${res.motivo}</small>`;
      if(block)block.style.display='none';
      if(btn){btn.disabled=false;btn.style.opacity='1';}
    }else{
      printOK2=false;
      iaDiv.className='ia-result ia-fail';
      iaDiv.innerHTML=`⚠️ <strong>Print inválido.</strong> Data: ${res.data_encontrada||'nenhuma'}<br><small>${res.motivo}</small>`;
      if(block){block.style.display='block';block.innerHTML='🚫 <strong>Cadastro bloqueado.</strong> A conta não foi criada hoje.';}
      if(btn){btn.disabled=true;btn.style.opacity='.45';}
    }
  }catch(e){
    iaDiv.className='ia-result ia-fail';iaDiv.textContent='Erro ao analisar. Tente novamente.';
    if(btn){btn.disabled=false;btn.style.opacity='1';}
  }
}

async function salvarLeadAfil(){
  const nome=document.getElementById('aln')?.value.trim();

  const casa=document.getElementById('alc')?.value;

    const ls=await dbPost('leads',[{nome,telefone:tel,pix,casa,cpa,meta,cpa_validado:false,print_verificado:true,afiliado_id:afilId||null}]);

async function exportarCSV(){
  try{
    const[leads,deps]=await Promise.all([dbGet('leads'),dbGet('depositos')]);
    const dm={};deps.forEach(d=>{if(!dm[d.lead_id])dm[d.lead_id]=[];dm[d.lead_id].push(d);});
    let csv='Nome,Telefone,PIX,Casa,Meta (R$),CPA (R$),Depositado (R$),Print Verificado,Status,Dep1,Dep2,Dep3,Dep4\n';
    leads.forEach(l=>{
      const lds=(dm[l.id]||[]).sort((a,b)=>a.data_deposito.localeCompare(b.data_deposito));
      const feito=lds.filter(d=>d.feito).reduce((s,d)=>s+parseFloat(d.valor),0);
      const d4=lds.slice(0,4).map(d=>`${fmtD(d.data_deposito)} R$${d.valor} ${d.feito?'(feito)':'(pendente)'}`);
      while(d4.length<4)d4.push('');
      csv+=`"${l.nome}","${l.telefone}","${l.pix}","${l.casa}",${l.meta},${l.cpa},${feito.toFixed(2)},"${l.print_verificado?'Sim':'Não'}","${l.cpa_validado?'CPA Validado':'Em andamento'}","${d4[0]}","${d4[1]}","${d4[2]}","${d4[3]}"\n`;
    });
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`cpaboss-${toDay()}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }catch(e){alert('Erro ao exportar: '+e.message);}
}

// Partículas douradas no seletor
function initParticles(){
  const canvas=document.getElementById('ls-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
  const particles=Array.from({length:55},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,
    r:Math.random()*1.8+.4,
    vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
    o:Math.random()*.5+.1,
    pulse:Math.random()*Math.PI*2
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.pulse+=.012;
      if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
      if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
      const alpha=p.o*(0.6+0.4*Math.sin(p.pulse));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,168,76,${alpha})`;ctx.fill();
    });
    // linhas entre partículas próximas
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x;
        const dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(201,168,76,${.06*(1-dist/120)})`;
          ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

},2600);
